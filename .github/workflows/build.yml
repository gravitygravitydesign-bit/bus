name: Build Flet Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # تحديث مستقر يمنع مشاكل الـ CLI

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet firebase-admin
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # إعداد وتثبيت الـ Flutter SDK لتجنب سؤال الأداة وتفادي الـ EOFError تماماً
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.22.0' # إصدار متوافق ومستقر جداً مع بناء flet الحالي

    # تشغيل البناء مع تمرير أمر الموافقة التلقائية الصريح
    - name: Build APK via Flet CLI
      run: |
        flet build apk --no-interactive

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bus-game-apk
        path: build/apk/*.apk
