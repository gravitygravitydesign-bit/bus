name: Build Flet Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. سحب كود المشروع
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. إعداد الجافا
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # 3. إعداد الـ Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 4. تثبيت أحدث مكتبات وأدوات flet صراحة وتجهيز المسار
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # إجبار السيرفر على تثبيت أحدث نسخة من flet و flet-cli لمنع تعليق الأداة القديمة
        python -m pip install --upgrade flet firebase-admin
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    # 5. تثبيت الفلاتر وتجهيز المسار بتاعه
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.22.0'

    # 6. تشغيل أمر البناء الذكي (استخدمنا أمر yes البديل للأداة الجديدة لمنع أي تعليق)
    - name: Build APK via Flet CLI
      run: |
        yes | flet build apk

    # 7. رفع ملف الـ APK الناتج كـ Artifact للتحميل
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bus-game-apk
        path: "**/build/apk/*.apk"
