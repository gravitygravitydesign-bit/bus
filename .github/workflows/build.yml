name: Build Flet Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    # حل التحذيرات الصفراء الخاصة بـ Node.js
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flet firebase-admin
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'

    # الحل السحري هنا: أمر yes بيضغط Enter أوتوماتيك لأي سؤال تسأله الأداة
    - name: Build APK via Flet CLI
      run: |
        yes | flet build apk --project-name "GravityBus"

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: bus-complete-apk
        path: build/apk/*.apk
